{% extends 'base/base.html' %}
{% block content %}

<style>
/* Wrapper */
.raffle-wrapper {
    min-height: 75vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Card */
.raffle-card {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border-radius: 16px;
    padding: 30px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

/* Dark Mode */
[data-theme="dark"] .raffle-card {
    background: #1f2937;
    border-color: #374151;
    color: #ffffff;
}

/* Title */
.raffle-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    text-align: center;
}

/* Alerts */
.alert {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 14px;
}

.alert-error {
    background: #fee2e2;
    color: #991b1b;
}

.alert-success {
    background: #dcfce7;
    color: #166534;
}

[data-theme="dark"] .alert-error {
    background: #7f1d1d;
    color: #fecaca;
}

[data-theme="dark"] .alert-success {
    background: #14532d;
    color: #bbf7d0;
}

/* Form Layout */
.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
}

/* Inputs */
.form-input,
.form-select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
    transition: border 0.2s ease, box-shadow 0.2s ease;
}

.form-input:focus,
.form-select:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
}

[data-theme="dark"] .form-input,
[data-theme="dark"] .form-select {
    background: #111827;
    border-color: #374151;
    color: #ffffff;
}

/* Checkbox */
.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

/* Button */
.raffle-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    background: #4f46e5;
    color: #ffffff;
    cursor: pointer;
    transition: background 0.2s ease;
}

.raffle-btn:hover {
    background: #4338ca;
}

/* Responsive */
@media (max-width: 480px) {
    .raffle-card {
        padding: 20px;
    }

    .raffle-title {
        font-size: 20px;
    }
}
</style>

<div class="raffle-wrapper">

    <div class="raffle-card">

        <h2 class="raffle-title">Raffle Control Panel</h2>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Raffle Mode</label>
                <select name="mode" class="form-select">
                    <option value="draw"
                        {% if raffle_setting.mode == "draw" %}selected{% endif %}>
                        🎡 Auto Generated (Wheel)
                    </option>
                    <option value="game"
                        {% if raffle_setting.mode == "game" %}selected{% endif %}>
                        🧠 Game-Based (Memory)
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Minimum Booth Visits</label>
                <input type="number"
                       name="min_booth_required"
                       value="{{ raffle_setting.min_booth_required }}"
                       class="form-input">
            </div>

            <div class="form-group">
                <label>Game Score Threshold</label>
                <input type="number"
                       name="game_threshold"
                       value="{{ raffle_setting.game_threshold }}"
                       class="form-input">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox"
                       name="is_active"
                       {% if raffle_setting.is_active %}checked{% endif %}>
                <span>Activate Raffle</span>
            </div>

            <button type="submit" class="raffle-btn">
                Save Settings
            </button>

            <a href="/adminpanel/staff/dashboard/" class="btn btn-secondary">
                Back to Dashboard
            </a>

        </form>

    </div>

</div>

{% endblock %}

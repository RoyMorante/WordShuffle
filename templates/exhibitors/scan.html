{% extends 'base/base.html' %}
{% block content %}

<style>
.scan-wrapper {
    max-width: 600px;
    margin: auto;
}

.scan-card {
    background: var(--card);
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.scan-title {
    margin-bottom: 18px;
}

#reader {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
}

#result {
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    font-weight: 600;
    text-align: center;
    min-height: 45px;
}

.result-success {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.4);
    color: #16a34a;
}

.result-duplicate {
    background: rgba(234,179,8,0.15);
    border: 1px solid rgba(234,179,8,0.4);
    color: #ca8a04;
}

.result-error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #dc2626;
}

.back-link {
    display: inline-block;
    margin-top: 24px;
    text-decoration: none;
    color: var(--accent);
    font-weight: 600;
}
</style>

<div class="scan-wrapper">
    <div class="scan-card">

        <h2 class="scan-title">Scan Viewer QR</h2>

        <div id="reader"></div>

        <div id="result"></div>

        <a href="/exhibitors/dashboard/" class="back-link">
            ← Back to Dashboard
        </a>

    </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<script>
const resultDiv = document.getElementById('result');
const html5QrCode = new Html5Qrcode("reader");

function setResult(message, type) {
    resultDiv.className = "";
    resultDiv.classList.add("result-" + type);
    resultDiv.innerHTML = message;
}

function onScanSuccess(decodedText, decodedResult) {
    html5QrCode.stop().then(() => {
        submitScan(decodedText);
    });
}

function onScanFailure(error) {
    // silent
}

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            onScanSuccess,
            onScanFailure
        );
    }
}).catch(err => {
    setResult("Camera access denied", "error");
});

function submitScan(token) {
    fetch('/visits/scan/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: `qr_token=${token}`
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            setResult("Visit Logged Successfully", "success");
        } else if (data.status === "duplicate") {
            setResult("Already Scanned", "duplicate");
        } else {
            setResult("Invalid QR Code", "error");
        }

        setTimeout(() => {
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                onScanSuccess,
                onScanFailure
            );
        }, 2000);
    })
    .catch(() => {
        setResult("Server Error", "error");
    });
}
</script>

{% endblock %}
